<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>생활 통합관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --lav: #ede9f7; --lav-mid: #d4ccea; --lav-acc: #8b73d4; --lav-dk: #6b52b8;
  --blush: #fde8ee; --blush-acc: #e8729a;
  --mint: #e3f5f0; --mint-acc: #4ab8a0;
  --peach: #fff0e6; --peach-acc: #f0935a;
  --sky: #e8f4fd; --sky-acc: #5a9fe0;
  --text: #2d2640; --text2: #6b6080; --text3: #9d93b5;
  --border: #e8e3f3; --white: #fff;
  --sh: 0 2px 16px rgba(139,115,212,.09);
  --sh-lg: 0 8px 32px rgba(139,115,212,.14);
  --r: 14px; --rs: 10px; --rx: 6px;
}
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: linear-gradient(135deg,#f5f0ff 0%,#fce8f3 45%,#e8f8f5 100%);
  min-height: 100vh; color: var(--text);
}
#root { min-height: 100vh; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-thumb { background:var(--lav-mid); border-radius:3px; }

@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes pop { 0%{transform:scale(.95)} 60%{transform:scale(1.02)} 100%{transform:scale(1)} }
.fade-in { animation: fadeIn .3s ease both; }

/* ── LAYOUT ── */
.app { max-width: 980px; margin: 0 auto; padding: 0 0 80px; }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 16px 10px;
}
.logo {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg,var(--lav-acc),var(--blush-acc));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(139,115,212,.3);
}
.header-text { flex: 1; min-width: 0; }
.header-title { font-size: 16px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 11px; color: var(--text3); }
.firebase-badge {
  font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
  background: #fff4e5; color: #e07d28; border: 1px solid #ffd8a8; white-space: nowrap;
}
/* ── HEADER IO LINKS ── */
.header-io {
  display: flex; align-items: center; gap: 0; flex-shrink: 0;
  font-size: 11px; font-weight: 600;
}
.hio-btn {
  background: none; border: none; cursor: pointer;
  font-family: inherit; font-size: 11px; font-weight: 600;
  color: var(--text3); padding: 4px 8px; transition: color .14s;
  white-space: nowrap;
}
.hio-btn:hover { color: var(--text2); }
.hio-btn.json { color: #b07800; }
.hio-btn.json:hover { color: #8a5c00; }
.hio-btn.xlsx-ex { color: #2e7d52; }
.hio-btn.xlsx-ex:hover { color: #1e5c3a; }
.hio-btn.xlsx-im { color: var(--sky-acc); }
.hio-btn.xlsx-im:hover { color: #3a7fc0; }
.hio-sep { color: var(--border); font-size: 12px; user-select: none; }

/* ── TABS (top, compact) ── */
.tab-bar {
  display: flex; gap: 4px; padding: 6px 12px 0;
  border-bottom: 2px solid var(--border); margin-bottom: 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 8px 14px; border: none; background: none;
  font-family: inherit; font-size: 12px; font-weight: 600;
  color: var(--text3); cursor: pointer; white-space: nowrap;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all .18s ease; border-radius: 0; flex-shrink: 0;
}
.tab-btn:hover { color: var(--text2); background: rgba(139,115,212,.06); border-radius: 8px 8px 0 0; }
.tab-btn.t-inv.on { color: var(--lav-acc); border-bottom-color: var(--lav-acc); }
.tab-btn.t-cos.on { color: var(--blush-acc); border-bottom-color: var(--blush-acc); }
.tab-btn.t-clo.on { color: var(--mint-acc); border-bottom-color: var(--mint-acc); }
.tab-btn.t-wsh.on { color: #e07d28; border-bottom-color: #e07d28; }
/* hide label on very small screens */
@media(max-width:360px){ .tab-label { display:none; } }

/* ── SECTION ── */
.section { padding: 0 12px; }

/* ── INLINE STATS (타이틀 옆) ── */
.istat { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.istat-item {
  font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px;
  background:rgba(139,115,212,.1); color:var(--text2); white-space:nowrap;
}

/* ── CARD ── */
.card {
  background: rgba(255,255,255,.88); backdrop-filter: blur(12px);
  border-radius: var(--r); border: 1px solid rgba(255,255,255,.95);
  box-shadow: var(--sh); padding: 16px; margin-bottom: 12px;
}

/* ── SECTION HEAD ── */
.sec-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
.sec-title { font-size:15px; font-weight:700; display:flex; align-items:center; gap:6px; }
.badge {
  font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px;
  background:var(--lav); color:var(--lav-acc);
}

/* ── FILTER ROW ── */
.filter-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
.srch { position:relative; flex:1; min-width:150px; }
.srch svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
.input-srch {
  width:100%; padding:8px 10px 8px 32px; border:1.5px solid var(--border);
  border-radius:var(--rs); font-family:inherit; font-size:12px;
  background:white; color:var(--text); outline:none;
}
.input-srch:focus { border-color:var(--lav-acc); }
.fselect {
  padding:8px 12px; border:1.5px solid var(--border); border-radius:var(--rs);
  font-family:inherit; font-size:12px; background:white; color:var(--text);
  outline:none; cursor:pointer;
}
.fselect:focus { border-color:var(--lav-acc); }

/* ── COLOR CHIPS ── */
.color-chips { display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; flex-wrap:nowrap; -webkit-overflow-scrolling:touch; }
.color-chips::-webkit-scrollbar { display:none; }
.color-chip {
  flex-shrink:0; padding:4px 11px; border-radius:20px; border:1.5px solid var(--border);
  font-size:11px; font-weight:600; cursor:pointer; background:white; color:var(--text2);
  transition:all .15s; white-space:nowrap; font-family:inherit;
}
.color-chip:hover { border-color:var(--lav-mid); }
.color-chip.active { background:var(--lav-acc); color:white; border-color:var(--lav-acc); }

/* ── TABLE ── */
.tbl-wrap { overflow-x:auto; border-radius:var(--rs); }
table { width:100%; border-collapse:collapse; min-width:540px; }
thead tr { background:var(--lav); }
th {
  padding:9px 12px; text-align:left; font-size:11px; font-weight:700;
  color:var(--lav-acc); white-space:nowrap; user-select:none;
  border-bottom:2px solid var(--lav-mid);
}
th.sort { cursor:pointer; }
th.sort:hover { color:var(--lav-dk); }
.th-in { display:flex; align-items:center; gap:3px; }
td {
  padding:9px 12px; font-size:12px; color:var(--text);
  border-bottom:1px solid var(--border); vertical-align:middle;
}
tr:last-child td { border-bottom:none; }
tbody tr { transition:background .1s; }
tbody tr:hover { background:rgba(237,233,247,.35); }

/* ── PROGRESS ── */
.prog { display:flex; align-items:center; gap:6px; min-width:100px; }
.prog-bg { flex:1; height:6px; background:var(--lav-mid); border-radius:100px; overflow:hidden; }
.prog-fill { height:100%; border-radius:100px; transition:width .4s ease; }
.prog-lbl { font-size:11px; font-weight:600; color:var(--text2); min-width:28px; }

/* ── STARS ── */
.stars { display:flex; gap:1px; }
.star { font-size:13px; color:#f5c842; line-height:1; }
.star.e { color:#e0dcea; }
.star-input { display:flex; gap:2px; }
.star-input button { background:none; border:none; cursor:pointer; font-size:20px; padding:1px; transition:transform .1s; line-height:1; }
.star-input button:hover { transform:scale(1.2); }

/* ── PILLS ── */
.pill { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:600; }
.p-grn { background:#e8f8f0; color:#3aaa76; }
.p-red { background:var(--blush); color:var(--blush-acc); }
.p-blu { background:var(--sky); color:var(--sky-acc); }
.p-pur { background:var(--lav); color:var(--lav-acc); }
.p-gry { background:#f2f0f7; color:var(--text3); }
.p-org { background:var(--peach); color:var(--peach-acc); }
.p-mnt { background:var(--mint); color:var(--mint-acc); }

/* ── BUTTONS ── */
.btn {
  display:inline-flex; align-items:center; gap:5px; padding:8px 14px;
  border-radius:var(--rs); font-family:inherit; font-size:12px; font-weight:600;
  cursor:pointer; border:none; transition:all .16s; white-space:nowrap;
}
.btn:active { transform:scale(.97); }
.b-pri { background:linear-gradient(135deg,var(--lav-acc),#a284e0); color:white; box-shadow:0 3px 10px rgba(139,115,212,.3); }
.b-cos { background:linear-gradient(135deg,var(--blush-acc),#f093b3); color:white; box-shadow:0 3px 10px rgba(232,114,154,.3); }
.b-clo { background:linear-gradient(135deg,var(--mint-acc),#6ed4be); color:white; box-shadow:0 3px 10px rgba(74,184,160,.3); }
.b-trv { background:linear-gradient(135deg,var(--sky-acc),#7eb9ec); color:white; box-shadow:0 3px 10px rgba(90,159,224,.3); }
.b-ghost { background:var(--lav); color:var(--lav-acc); border:1.5px solid var(--lav-mid); }
.b-ghost:hover { background:var(--lav-mid); }
.b-danger { background:#fff0f0; color:#e05757; border:1.5px solid #fdd5d5; }
.b-danger:hover { background:#ffe0e0; }
.btn-sm { padding:5px 10px; font-size:11px; border-radius:var(--rx); }
.btn-ic { padding:6px; border-radius:var(--rx); background:var(--lav); color:var(--lav-acc); border:1.5px solid var(--lav-mid); }
.btn-ic:hover { background:var(--lav-mid); }

/* ── MODAL ── */
.overlay {
  position:fixed; inset:0; background:rgba(40,30,70,.35); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; z-index:1000; padding:16px;
  animation:fadeIn .2s ease;
}
.modal {
  background:white; border-radius:18px; box-shadow:0 16px 64px rgba(40,30,70,.22);
  width:100%; max-width:500px; max-height:92vh; overflow-y:auto;
  animation:pop .22s ease;
}
.modal-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px 14px; border-bottom:1.5px solid var(--border);
  position:sticky; top:0; background:white; z-index:1; border-radius:18px 18px 0 0;
}
.modal-title { font-size:14px; font-weight:700; display:flex; align-items:center; gap:7px; }
.modal-body { padding:16px 20px 20px; }
.modal-ft { padding:0 20px 18px; display:flex; gap:8px; justify-content:flex-end; }

/* ── FORM ── */
.fg2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.fg1 { display:grid; grid-template-columns:1fr; gap:12px; }
.fg { display:flex; flex-direction:column; gap:4px; }
.fg.full { grid-column:1/-1; }
label { font-size:11px; font-weight:600; color:var(--text2); }
.inp,.txta,.sel {
  padding:9px 11px; border:1.5px solid var(--border); border-radius:var(--rs);
  font-family:inherit; font-size:12px; color:var(--text); outline:none;
  transition:border .14s,box-shadow .14s; background:white;
}
.inp:focus,.txta:focus,.sel:focus { border-color:var(--lav-acc); box-shadow:0 0 0 3px rgba(139,115,212,.1); }
.txta { resize:vertical; min-height:72px; }

/* ── TOGGLE PAIR ── */
.tog-wrap { display:flex; border:1.5px solid var(--border); border-radius:var(--rs); overflow:hidden; }
.tog {
  flex:1; padding:8px 10px; border:none; background:white; font-family:inherit;
  font-size:12px; cursor:pointer; transition:all .14s; font-weight:500; color:var(--text2);
}
.tog+.tog { border-left:1.5px solid var(--border); }
.tog.t-yes { background:#e8f8f0; color:#3aaa76; font-weight:700; }
.tog.t-no  { background:var(--blush); color:var(--blush-acc); font-weight:700; }

/* ── DISPOSAL ── */
.disp-hd {
  display:flex; align-items:center; gap:8px; padding:12px 16px;
  background:var(--blush); cursor:pointer; user-select:none;
}
.disp-title { font-size:13px; font-weight:700; color:var(--blush-acc); flex:1; }
.disp-body { padding:12px; background:#fff7f9; }

/* ── EMPTY ── */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:44px 20px; gap:10px; color:var(--text3); }
.empty p { font-size:13px; }

/* ── ROW ACTIONS ── */
.ra { display:flex; gap:3px; }

/* ── CLOSET GRID ── */
.clo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; }
.clo-card {
  background:white; border-radius:var(--r); border:1.5px solid var(--border);
  padding:14px; transition:all .18s; animation:fadeIn .3s ease;
}
.clo-card:hover { box-shadow:var(--sh-lg); transform:translateY(-1px); border-color:var(--lav-mid); }
.clo-ch { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
.clo-ct { font-size:14px; font-weight:700; }
.clo-cs { font-size:11px; color:var(--text3); margin-top:2px; }
.clo-dr { display:flex; gap:5px; align-items:flex-start; margin-bottom:6px; }
.clo-dl { font-size:10px; font-weight:600; color:var(--text3); min-width:38px; }
.clo-dv { font-size:11px; color:var(--text2); flex:1; }

/* ── TRAVEL ── */
.trip-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
.trip-card {
  background:white; border-radius:var(--r); border:1.5px solid var(--border);
  padding:16px; transition:all .18s; cursor:pointer; animation:fadeIn .3s ease;
}
.trip-card:hover { box-shadow:var(--sh-lg); transform:translateY(-1px); border-color:#b8d9f5; }
.trip-card.selected { border-color:var(--sky-acc); box-shadow:0 0 0 3px rgba(90,159,224,.12); }
.trip-name { font-size:15px; font-weight:700; color:var(--text); margin-bottom:4px; }
.trip-dest { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:4px; margin-bottom:8px; }
.trip-dates { font-size:11px; color:var(--text3); margin-bottom:10px; }
.trip-prog-row { display:flex; align-items:center; gap:6px; }
.trip-detail {
  background:white; border-radius:var(--r); border:1.5px solid var(--border);
  padding:18px; margin-bottom:12px; animation:fadeIn .25s ease;
}
.trip-detail-title { font-size:14px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:6px; }
.check-list { display:flex; flex-direction:column; gap:6px; }
.check-item {
  display:flex; align-items:center; gap:8px; padding:8px 10px;
  background:var(--lav); border-radius:var(--rx); transition:background .12s;
}
.check-item.done { background:#f0fdf5; }
.check-item input[type=checkbox] { accent-color:var(--lav-acc); width:15px; height:15px; cursor:pointer; flex-shrink:0; }
.check-item label { font-size:12px; cursor:pointer; flex:1; font-weight:400; color:var(--text); }
.check-item.done label { text-decoration:line-through; color:var(--text3); }
.check-add { display:flex; gap:6px; margin-top:8px; }
.budget-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.budget-item { display:flex; flex-direction:column; gap:2px; flex:1; min-width:100px; }
.budget-lbl { font-size:10px; color:var(--text3); font-weight:600; }
.budget-val { font-size:18px; font-weight:700; color:var(--text); }

/* ── IMAGE ── */
.img-thumb {
  width:44px; height:44px; border-radius:var(--rx); object-fit:cover;
  cursor:pointer; border:1.5px solid var(--border); transition:transform .15s;
  flex-shrink:0;
}
.img-thumb:hover { transform:scale(1.08); border-color:var(--lav-acc); }
.img-upload-btn {
  display:inline-flex; align-items:center; gap:5px; padding:7px 12px;
  border:2px dashed var(--lav-mid); border-radius:var(--rs); cursor:pointer;
  font-size:12px; color:var(--text3); background:var(--lav); transition:all .15s;
  font-family:inherit; font-weight:500;
}
.img-upload-btn:hover { border-color:var(--lav-acc); color:var(--lav-acc); background:rgba(139,115,212,.1); }
.img-preview-wrap { position:relative; display:inline-block; }
.img-preview-wrap img { width:100%; max-height:200px; object-fit:cover; border-radius:var(--rs); border:1.5px solid var(--border); }
.img-del-btn {
  position:absolute; top:-6px; right:-6px; width:20px; height:20px;
  border-radius:50%; background:#e05757; color:white; border:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
}
/* 라이트박스 */
.lightbox {
  position:fixed; inset:0; background:rgba(10,5,30,.88); z-index:2000;
  display:flex; align-items:center; justify-content:center;
  animation:fadeIn .2s ease; padding:20px;
}
.lightbox img { max-width:100%; max-height:90vh; border-radius:var(--r); box-shadow:0 16px 64px rgba(0,0,0,.5); }
.lightbox-close {
  position:absolute; top:16px; right:16px; background:rgba(255,255,255,.15);
  border:none; color:white; width:36px; height:36px; border-radius:50%;
  cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
}
/* 카드 이미지 커버 */
.card-img-cover {
  width:100%; height:140px; object-fit:cover; border-radius:var(--rs);
  margin-bottom:10px; cursor:pointer; border:1px solid var(--border);
}
/* 여행 카드 이미지 그라데이션 */
.trip-card-img-wrap {
  position:relative; width:100%; height:160px;
  border-radius:var(--rs); overflow:hidden; margin-bottom:10px; cursor:pointer;
}
.trip-card-img-wrap img {
  width:100%; height:100%; object-fit:cover; display:block;
}
.trip-card-img-wrap::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(to bottom, rgba(0,0,0,0) 30%, rgba(20,10,50,.72) 100%);
  border-radius:var(--rs);
}
.trip-card-img-overlay {
  position:absolute; bottom:0; left:0; right:0; padding:10px 12px;
  z-index:1; pointer-events:none;
}
.trip-card-img-name { font-size:15px; font-weight:700; color:white; text-shadow:0 1px 4px rgba(0,0,0,.4); }
.trip-card-img-dest { font-size:11px; color:rgba(255,255,255,.82); display:flex; align-items:center; gap:3px; margin-top:2px; }

/* ── SORT ICON ── */
.si { font-size:9px; }

/* ── COLOR CIRCLE CHIPS ── */
.color-circle-row { display:flex; gap:6px; flex-wrap:nowrap; overflow-x:auto; padding-bottom:10px; -webkit-overflow-scrolling:touch; }
.color-circle-row::-webkit-scrollbar { display:none; }
.color-circle-btn {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  background:none; border:none; cursor:pointer; padding:2px 4px; flex-shrink:0;
  font-family:inherit;
}
.color-circle {
  width:28px; height:28px; border-radius:50%;

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ═══════════════════════════════════════════════════════════════════
// FIREBASE LAYER
// ═══════════════════════════════════════════════════════════════════
const FB_CONFIG_KEY = '__fb_config_v1';
const FB_DEFAULT_AUTH = 'email'; // 'email' or 'none'

// Firebase 초기화 (한 번만)
let __fbApp = null, __fbDb = null, __fbAuth = null;
const initFirebase = (config) => {
  if (__fbApp) return { app: __fbApp, db: __fbDb, auth: __fbAuth };
  try {
    __fbApp = firebase.initializeApp(config);
    __fbDb = firebase.firestore();
    __fbAuth = firebase.auth();
    // 오프라인 캐시 활성화 (탭당 1회만 가능)
    try { __fbDb.enablePersistence({ synchronizeTabs: true }); } catch (e) {}
    return { app: __fbApp, db: __fbDb, auth: __fbAuth };
  } catch (e) {
    console.error('Firebase init error:', e);
    return null;
  }
};

// 저장된 config 읽기
const getStoredFbConfig = () => {
  try { const s = localStorage.getItem(FB_CONFIG_KEY); return s ? JSON.parse(s) : null; }
  catch { return null; }
};

// 부팅 시 자동 초기화
const __bootCfg = getStoredFbConfig();
if (__bootCfg) initFirebase(__bootCfg);

// Firebase auth 상태 훅
const useFirebaseAuth = () => {
  const [user, setUser] = useState(__fbAuth?.currentUser || null);
  const [ready, setReady] = useState(false);
  const [enabled, setEnabled] = useState(!!__fbAuth);
  useEffect(() => {
    if (!__fbAuth) { setReady(true); return; }
    const unsub = __fbAuth.onAuthStateChanged(u => { setUser(u); setReady(true); });
    return unsub;
  }, [enabled]);
  return { user, ready, enabled, setEnabled };
};

// 현재 모드: 'firebase' (signed in) | 'local' (localStorage only)
const getMode = (user) => (user && __fbDb) ? 'firebase' : 'local';

// ═══════════════════════════════════════════════════════════════════
// DATA LAYER — localStorage OR Firebase Firestore (signed-in mode)
// ═══════════════════════════════════════════════════════════════════
const useData = (key, initial) => {
  const auth = useFirebaseAuth();
  const mode = getMode(auth.user);
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; } catch { return initial; }
  });
  const skipNextWrite = useRef(false);

  // Firestore 실시간 구독
  useEffect(() => {
    if (mode !== 'firebase' || !auth.user) return;
    const ref = __fbDb.collection('users').doc(auth.user.uid).collection('data').doc(key);
    const unsub = ref.onSnapshot(snap => {
      if (snap.exists) {
        const remote = snap.data().items || initial;
        skipNextWrite.current = true;
        setVal(remote);
        try { localStorage.setItem(key, JSON.stringify(remote)); } catch {}
      } else {
        // 원격에 없으면 로컬 데이터를 업로드 (최초 마이그레이션)
        const localData = (() => { try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch { return null; } })();
        if (Array.isArray(localData) && localData.length > 0) {
          ref.set({ items: localData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        }
      }
    }, err => console.error('Firestore subscribe error:', err));
    return unsub;
  }, [mode, auth.user, key]);

  const set = useCallback(v => {
    setVal(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
    if (mode === 'firebase' && auth.user && !skipNextWrite.current) {
      const ref = __fbDb.collection('users').doc(auth.user.uid).collection('data').doc(key);
      ref.set({ items: v, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
         .catch(e => console.error('Firestore write error:', e));
    }
    skipNextWrite.current = false;
  }, [key, mode, auth.user]);

  return [val, set];
};

const uid = () => Math.random().toString(36).slice(2, 9);
const today = () => new Date().toISOString().slice(0, 10);

// ── Icon helper ──────────────────────────────────────────────────
const Icon = ({ name, size = 14, color }) => {
  const ref = React.useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = '';
    const el = lucide.createElement(lucide[name] || lucide.HelpCircle);
    el.setAttribute('width', size); el.setAttribute('height', size);
    if (color) el.setAttribute('stroke', color);
    ref.current.appendChild(el);
  }, [name, size, color]);
  return <span ref={ref} style={{ display:'inline-flex', alignItems:'center', flexShrink:0 }} />;
};

// ── Color chip filter ─────────────────────────────────────────────
// 화장품 전용 색상 칩
const COS_COLOR_FILTERS = [
  { key:'pink',  label:'핑크',   match:['핑크','pink','rose','로즈','코랄','coral'] },
  { key:'red',   label:'레드',   match:['레드','red','립레드','버건디','burgundy','딥레드'] },
  { key:'white', label:'화이트', match:['화이트','white','아이보리','ivory','밝은','light'] },
  { key:'beige', label:'베이지', match:['베이지','beige','누드','nude','피치','peach'] },
  { key:'orange',label:'오렌지', match:['오렌지','orange','어스','earth','테라코타','terra'] },
  { key:'X',     label:'미입력', match:[] },

// 옷장 전용 색상 칩
const CLO_COLOR_FILTERS = [
  { key:'white',  label:'화이트', match:['화이트','white','아이보리','ivory','크림','cream'] },
  { key:'blue',   label:'블루',   match:['블루','blue','스카이','sky','하늘','인디고','indigo'] },
  { key:'yellow', label:'옐로우', match:['옐로우','yellow','노란','머스타드','mustard'] },
  { key:'black',  label:'블랙',   match:['블랙','black','차콜','charcoal'] },
  { key:'beige',  label:'베이지', match:['베이지','beige','누드','nude','아이보리','ivory','크림','cream'] },
  { key:'gray',   label:'그레이', match:['그레이','gray','grey','회색','라이트그레이'] },
  { key:'navy',   label:'네이비', match:['네이비','navy','짙은 블루','다크블루'] },
  { key:'other',  label:'기타',   match:['그린','green','퍼플','purple','브라운','brown','레드','red','핑크','pink','오렌지','orange','버건디'] },
  { key:'mix',    label:'믹스',   match:['믹스','mix','혼합','패턴','stripe','스트라이프','체크','check','플로럴','floral'] },
  { key:'X',      label:'미입력', match:[] },
];

const matchesColorFilter = (val, filter) => {
  if (filter.key === 'X') return !val || val.trim() === '';
  return filter.match.some(m => val.toLowerCase().includes(m.toLowerCase()));
};

const matchesColorFilterWithTag = (item, colorField, filterKey, filters) => {
  if (filterKey === 'X') return !item.colorTag && (!item[colorField] || item[colorField].trim() === '');
  if (item.colorTag) return item.colorTag === filterKey;
  const f = filters.find(f=>f.key===filterKey);
  if (!f) return false;
  return matchesColorFilter(item[colorField]||'', f);
};

// 범용 ColorChips (기존 호환)
const COLOR_KW = ['블랙','화이트','베이지','그레이','네이비','블루','레드','핑크','옐로우','그린','브라운','퍼플','오렌지','코랄','누드'];
const ColorChips = ({ items, field, active, onSelect }) => {
  const found = useMemo(() => {
    const set = new Set();
    items.forEach(i => {
      const val = (i[field] || '').toLowerCase();
      COLOR_KW.forEach(kw => { if (val.includes(kw.toLowerCase())) set.add(kw); });
    });
    return [...set];
  }, [items, field]);
  if (!found.length) return null;
  return (
    <div className="color-chips" style={{ marginBottom: 10 }}>
      <button className={`color-chip ${active===''?'active':''}`} onClick={() => onSelect('')}>전체</button>
      {found.map(kw => (
        <button key={kw} className={`color-chip ${active===kw?'active':''}`} onClick={() => onSelect(active===kw?'':kw)}>
          {kw}
        </button>
      ))}
    </div>
  );
};

// 컬러 서클 칩 (화장품/옷장 전용)
const COLOR_CIRCLE_DEFS = {

    { key:'beige',  label:'베이지', color:'#d9b99b' },
    { key:'orange', label:'오렌지', color:'#f07040' },
    { key:'X',      label:'미입력', color:'#e8e3f3', border:'#c4bedd', textColor:'#9d93b5' },
  ],
  clo: [
    { key:'white',  label:'화이트', color:'#f5f0ee', border:'#ddd' },
    { key:'blue',   label:'블루',   color:'#5a9fe0' },
    { key:'yellow', label:'옐로우', color:'#f5c842' },
    { key:'black',  label:'블랙',   color:'#2d2640' },
    { key:'beige',  label:'베이지', color:'#d9b99b' },
    { key:'gray',   label:'그레이', color:'#9d93b5' },
    { key:'navy',   label:'네이비', color:'#2c3e70' },

          }} />

// ═══════════════════════════════════════════════════════════════════
// IMAGE DB — IndexedDB (local) + Firestore (cloud) 하이브리드
// 모드 자동 선택: 로그인 상태면 Firestore, 아니면 IndexedDB
// ═══════════════════════════════════════════════════════════════════

// 이미지 압축 (Firestore 1MB 제한 대응)
const compressImage = (file, maxWidth=1280, quality=0.82) => new Promise((res, rej) => {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      // JPEG로 변환하여 base64 반환
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      // 750KB 넘으면 더 압축
      if (dataUrl.length > 750000) {
        dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      }
      if (dataUrl.length > 750000) {
        canvas.width = w*0.8; canvas.height = h*0.8;
        canvas.getContext('2d').drawImage(img, 0, 0, w*0.8, h*0.8);
        dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      }
      res(dataUrl);
    };
    img.onerror = rej;
    img.src = e.target.result;
  };
  reader.onerror = rej;
  reader.readAsDataURL(file);
});

// 현재 Firebase 사용자 가져오기 (동기)
const getFbUser = () => __fbAuth?.currentUser || null;

const ImageDB = (() => {
  let _db = null;
  const open = () => new Promise((res, rej) => {
    if (_db) return res(_db);
    const req = indexedDB.open('LifeManagerImgs', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('imgs', { keyPath:'id' });
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = rej;
  });

  // ── IndexedDB 기본 동작 ──
  const idbSave = async (id, base64) => {
    const db = await open();
    return new Promise((res, rej) => {
      const tx = db.transaction('imgs','readwrite');
      tx.objectStore('imgs').put({ id, base64 });
      tx.oncomplete = res; tx.onerror = rej;
    });
  };
  const idbGet = async (id) => {
    const db = await open();
    return new Promise((res, rej) => {
      const tx = db.transaction('imgs','readonly');
      const req = tx.objectStore('imgs').get(id);
      req.onsuccess = e => res(e.target.result?.base64 || null);
      req.onerror = rej;
    });
  };
  const idbDel = async (id) => {
    const db = await open();
    return new Promise((res, rej) => {
      const tx = db.transaction('imgs','readwrite');
      tx.objectStore('imgs').delete(id);
      tx.oncomplete = res; tx.onerror = rej;
    });
  };
  const idbGetAll = async () => {
    const db = await open();
    return new Promise((res, rej) => {
      const tx = db.transaction('imgs','readonly');
      const req = tx.objectStore('imgs').getAll();
      req.onsuccess = e => res(e.target.result || []);
      req.onerror = rej;
    });
  };
  const idbSaveAll = async (entries) => {
    const db = await open();
    return new Promise((res, rej) => {
      const tx = db.transaction('imgs','readwrite');
      entries.forEach(e => tx.objectStore('imgs').put(e));
      tx.oncomplete = res; tx.onerror = rej;
    });
  };

  // ── Firestore 동작 ──
  const fsRef = (id) => {
    const user = getFbUser();
    if (!user || !__fbDb) return null;
    return __fbDb.collection('users').doc(user.uid).collection('images').doc(id);
  };

  return {
    async save(id, base64) {
      // 로컬 IndexedDB에 항상 저장 (캐시 + 오프라인)
      await idbSave(id, base64);
      // 로그인 중이면 Firestore에도 저장
      const ref = fsRef(id);
      if (ref) {
        try { await ref.set({ base64, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }); }
        catch(e) { console.error('Image FS save error:', e); }
      }
    },
    async get(id) {
      // 우선 IndexedDB에서 가져오기
      const local = await idbGet(id);
      if (local) return local;
      // 없으면 Firestore 조회
      const ref = fsRef(id);
      if (ref) {
        try {
          const snap = await ref.get();
          if (snap.exists) {
            const b64 = snap.data().base64;
            if (b64) { idbSave(id, b64); return b64; }
          }
        } catch(e) { console.error('Image FS get error:', e); }
      }
      return null;
    },
    async del(id) {
      await idbDel(id);
      const ref = fsRef(id);
      if (ref) { try { await ref.delete(); } catch(e) {} }
    },
    async getAll() { return idbGetAll(); },
    async saveAll(entries) {
      await idbSaveAll(entries);
      // Firestore 일괄 업로드는 비용 부담 있으므로 로컬만
    }
  };
})();

// 파일 → base64 (압축 적용)
const fileToBase64 = compressImage;

// ── useImage hook ───────────────────────────────────────────────
const useImage = (itemId) => {
  const [src, setSrc] = useState(null);
  useEffect(() => {
    if (!itemId) return;
    ImageDB.get(itemId).then(v => setSrc(v || null));
  }, [itemId]);
  const save = useCallback(async (file) => {
    const b64 = await fileToBase64(file);
    await ImageDB.save(itemId, b64);
    setSrc(b64);
  }, [itemId]);
  const remove = useCallback(async () => {
    await ImageDB.del(itemId);
    setSrc(null);
  }, [itemId]);
  return { src, save, remove };
};

// ── Lightbox ────────────────────────────────────────────────────
const Lightbox = ({ src, onClose }) => {
  useEffect(() => {
    const h = e => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);
  if (!src) return null;
  return (
    <div className="lightbox" onClick={onClose}>
      <button className="lightbox-close" onClick={onClose}>✕</button>
      <img src={src} alt="" onClick={e => e.stopPropagation()} />
    </div>
  );
};

// ── ImageThumb — 테이블/카드 썸네일 ───────────────────────────
const ImageThumb = ({ itemId, onOpen, className }) => {
  const { src } = useImage(itemId);
  if (!src) return null;

// ── 엑셀 내보내기 ────────────────────────────────────────────────
const exportXlsx = () => {
  if (!window.XLSX) return alert('SheetJS 로드 실패. 잠시 후 다시 시도하세요.');
  const wb = XLSX.utils.book_new();
  Object.values(SHEETS).forEach(({ key, name, cols }) => {
    let rows = [];
    try { rows = JSON.parse(localStorage.getItem(key) || '[]'); } catch {}
    const headers = cols.map(c => c.h);
    const data = rows.map(row => cols.map(c => row[c.f] ?? ''));
    const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
    // 컬럼 너비 설정
    ws['!cols'] = cols.map(() => ({ wch: 18 }));
    XLSX.utils.book_append_sheet(wb, ws, name);
  });
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `생활통합관리_${date}.xlsx`);
};

// ── 엑셀 가져오기 파서 ──────────────────────────────────────────
const parseXlsx = (file) => new Promise((resolve, reject) => {
  if (!window.XLSX) return reject('SheetJS 로드 실패');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'binary', cellDates:true });
      const result = {};
      Object.entries(SHEETS).forEach(([tabId, { name, cols, defaults }]) => {
        const ws = wb.Sheets[name];
        if (!ws) return;
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        if (rows.length < 2) return;
        const [headerRow, ...dataRows] = rows;
        // 헤더→필드 매핑
        const idxMap = cols.map(c => headerRow.indexOf(c.h));
        const parsed = dataRows
          .filter(r => r.some(cell => cell !== ''))
          .map(r => {
            const obj = { ...defaults, id: uid() };
            cols.forEach((c, i) => {
              const idx = idxMap[i];
              if (idx !== -1 && r[idx] !== '') {
                let v = r[idx];
                if (v instanceof Date) v = v.toISOString().slice(0,10);
                obj[c.f] = String(v);
              }
            });
            return obj;
          });
        result[tabId] = parsed;
      });
      resolve(result);
    } catch(err) { reject(err); }
  };
  reader.onerror = reject;
  reader.readAsBinaryString(file);
});

// ── JSON 내보내기 ────────────────────────────────────────────────
const exportJson = async () => {
  const payload = { version:'1.1', exportedAt: new Date().toISOString(), data:{}, images:[] };
  Object.keys(ALL_KEYS).forEach(k => {
    try { payload.data[k] = JSON.parse(localStorage.getItem(k) || '[]'); } catch { payload.data[k] = []; }
  });
  try { payload.images = await ImageDB.getAll(); } catch {}
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `생활통합관리_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

// ── JSON 파일 파싱 ────────────────────────────────────────────────
const parseJson = file => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      // 두 가지 형식 지원: { version, data:{...} } 또는 직접 { inv_items:[], ... }
      const data = parsed.data || parsed;
      // 검증: 최소 하나의 키가 있어야 함
      const valid = Object.keys(ALL_KEYS).some(k => Array.isArray(data[k]));
      if (!valid) return reject('올바른 백업 파일이 아닙니다.');
      resolve({ meta: { exportedAt: parsed.exportedAt, version: parsed.version }, data });
    } catch { reject('JSON 파일 파싱 실패. 올바른 파일인지 확인하세요.'); }
  };
  reader.onerror = () => reject('파일 읽기 실패');
  reader.readAsText(file, 'utf-8');
});

        </div>
      </Modal>
      {lbSrc&&<Lightbox src={lbSrc} onClose={()=>setLbSrc(null)}/>}
    </div>
  );
};

const TRV_STATUS = { plan:'계획중', going:'여행중', done:'완료' };
const TRV_COLORS = { plan:'p-pur', going:'p-grn', done:'p-gry' };
const TRV_EMPTY = { id:'', name:'', dest:'', startDate:'', endDate:'', status:'plan', budget:'', spent:'', note:'', checklist:[], days:[] };

// 일별 계획의 활동 카테고리
const DAY_ACT_CATS = ['이동','숙소','식사','관광','쇼핑','액티비티','기타'];
const DAY_ACT_COLORS = { '이동':'p-pur','숙소':'p-blu','식사':'p-org','관광':'p-grn','쇼핑':'p-red','액티비티':'p-mnt','기타':'p-gry' };

// 날짜 범위 → Day 배열 생성
const buildDays = (startDate, endDate, existingDays=[]) => {
  if (!startDate) return existingDays;
  const start = new Date(startDate);
  const end = endDate ? new Date(endDate) : start;
  const days = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    const dateStr = d.toISOString().slice(0,10);
    const existing = existingDays.find(dd=>dd.date===dateStr);
    days.push(existing || { id:uid(), date:dateStr, title:'', activities:[] });
  }
  return days;
};

const dayLabel = (dateStr, idx) => {
  const d = new Date(dateStr);
  const week = ['일','월','화','수','목','금','토'][d.getDay()];
  return `Day ${idx+1} · ${dateStr.slice(5).replace('-','/')} (${week})`;
};

// ── 일별 계획 패널 ────────────────────────────────────────────────
const DayPlanPanel = ({ trip, trips, setTrips, setSelected }) => {
  const [openDay, setOpenDay] = useState(null);
  const [actModal, setActModal] = useState(false);
  const [editingAct, setEditingAct] = useState(null);
  const [actForm, setActForm] = useState({ id:'', cat:'관광', time:'', title:'', place:'', cost:'', note:'' });
  const [newActDay, setNewActDay] = useState(null);
  const [dayTitleEdit, setDayTitleEdit] = useState(null);

  const updateTrip = (updater) => {
    const updated = trips.map(t => t.id!==trip.id ? t : updater(t));
    setTrips(updated);
    setSelected(updated.find(t=>t.id===trip.id));
  };

  const syncDays = () => {
    updateTrip(t => ({
      ...t,
      days: buildDays(t.startDate, t.endDate, t.days||[])
    }));
  };

  const days = trip.days || [];

  const openAddAct = (dayId) => {
    setNewActDay(dayId);
    setEditingAct(null);
    setActForm({ id:uid(), cat:'관광', time:'', title:'', place:'', cost:'', note:'' });
    setActModal(true);
  };

    setActForm({ ...act });
    setActModal(true);
  };
  const saveAct = () => {
    if (!actForm.title.trim()) return alert('활동명을 입력하세요');
    updateTrip(t => ({
      ...t,
      days: (t.days||[]).map(d => d.id!==newActDay ? d : {
        ...d,

          ? d.activities.map(a => a.id===editingAct ? actForm : a)

    setActModal(false);

    updateTrip(t => ({
      ...t,
      days: (t.days||[]).map(d => d.id!==dayId ? d : {
        ...d, activities: d.activities.filter(a=>a.id!==actId)
      })

  };
  const saveDayTitle = (dayId, title) => {
    updateTrip(t => ({
      ...t,
      days: (t.days||[]).map(d => d.id!==dayId ? d : { ...d, title })
    }));
    setDayTitleEdit(null);
  };

  const totalCost = days.reduce((s,d)=>s+(d.activities||[]).reduce((ss,a)=>ss+(Number(a.cost)||0),0),0);

    <div style={{marginTop:16}}>
      {/* 헤더 */}

          <Icon name="CalendarDays" size={15} color="var(--sky-acc)" />

          <span className="badge" style={{background:'var(--sky)',color:'var(--sky-acc)'}}>{days.length}일</span>
          {totalCost>0&&<span style={{fontSize:11,color:'var(--text3)',fontWeight:500}}>활동비 ₩{totalCost.toLocaleString()}</span>}
        </div>
        {trip.startDate&&(
          <button className="btn b-ghost btn-sm" onClick={syncDays} title="날짜 기준으로 Day 재생성">
            <Icon name="RefreshCw" size={11}/>일정 동기화
          </button>
        )}
      </div>

      {days.length===0&&(
        <div style={{padding:'20px',textAlign:'center',color:'var(--text3)',fontSize:12,background:'var(--sky)',borderRadius:'var(--rs)'}}>
          출발일/귀국일을 설정하고 <b>일정 동기화</b>를 눌러 Day별 계획을 시작하세요
        </div>
      )}

      {/* Day 목록 */}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {days.map((day, idx)=>{
          const isOpen = openDay===day.id;
          const acts = day.activities||[];
          const dayCost = acts.reduce((s,a)=>s+(Number(a.cost)||0),0);
          return (
            <div key={day.id} style={{border:'1.5px solid var(--border)',borderRadius:'var(--rs)',overflow:'hidden',background:'white'}}>
              {/* Day 헤더 */}
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:isOpen?'var(--sky)':'white',cursor:'pointer',transition:'background .15s'}}
                onClick={()=>setOpenDay(isOpen?null:day.id)}>
                <div style={{width:28,height:28,borderRadius:8,background:'var(--sky-acc)',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>
                  {idx+1}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,color:'var(--sky-acc)',fontWeight:700}}>{dayLabel(day.date,idx)}</div>
                  {dayTitleEdit===day.id ? (
                    <input
                      className="inp" autoFocus
                      style={{fontSize:12,padding:'2px 6px',marginTop:2,height:24}}
                      defaultValue={day.title}
                      onBlur={e=>saveDayTitle(day.id,e.target.value)}
                      onKeyDown={e=>{if(e.key==='Enter')saveDayTitle(day.id,e.target.value);if(e.key==='Escape')setDayTitleEdit(null);}}
                      onClick={e=>e.stopPropagation()}
                    />
                  ) : (
                    <div style={{fontSize:12,color:'var(--text2)',marginTop:1,display:'flex',alignItems:'center',gap:4}}>
                      {day.title||<span style={{color:'var(--text3)'}}>제목 없음</span>}
                      <button style={{background:'none',border:'none',cursor:'pointer',padding:2,color:'var(--text3)',opacity:.6}} onClick={e=>{e.stopPropagation();setDayTitleEdit(day.id);}}><Icon name="Pencil" size={9}/></button>
                    </div>
                  )}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                  {acts.length>0&&<span style={{fontSize:10,color:'var(--text3)'}}>{acts.length}개</span>}
                  {dayCost>0&&<span style={{fontSize:10,color:'var(--sky-acc)',fontWeight:600}}>₩{dayCost.toLocaleString()}</span>}

                </div>
              </div>

              {/* Day 상세 */}
              {isOpen&&(
                <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)'}}>
                  {acts.length===0&&<div style={{fontSize:11,color:'var(--text3)',padding:'8px 0',textAlign:'center'}}>등록된 활동이 없습니다</div>}
                  <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:8}}>
                    {[...acts].sort((a,b)=>(a.time||'').localeCompare(b.time||'')).map(act=>(
                      <div key={act.id} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'8px 10px',background:'#f9f8ff',borderRadius:'var(--rx)',border:'1px solid var(--border)'}}>
                        <div style={{flexShrink:0,marginTop:1}}>
                          <span className={`pill ${DAY_ACT_COLORS[act.cat]||'p-gry'}`} style={{fontSize:9}}>{act.cat}</span>

                        <div style={{flex:1,minWidth:0}}>

                            {act.time&&<span style={{fontSize:10,fontWeight:700,color:'var(--sky-acc)',minWidth:36}}>{act.time}</span>}
                            <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{act.title}</span>
                            {act.cost&&<span style={{fontSize:10,color:'var(--text3)',marginLeft:'auto'}}>₩{Number(act.cost).toLocaleString()}</span>}
                          </div>
                          {act.place&&<div style={{fontSize:11,color:'var(--text2)',marginTop:2,display:'flex',alignItems:'center',gap:3}}><Icon name="MapPin" size={9} color="var(--text3)"/>{act.place}</div>}
                          {act.note&&<div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{act.note}</div>}
                        </div>
                        <div className="ra" style={{flexShrink:0}}>
                          <button className="btn btn-ic btn-sm" style={{padding:'3px 5px'}} onClick={()=>openEditAct(day.id,act)}><Icon name="Pencil" size={10}/></button>
                          <button className="btn b-danger btn-sm" style={{padding:'3px 5px'}} onClick={()=>removeAct(day.id,act.id)}><Icon name="Trash2" size={10}/></button>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button className="btn b-trv btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={()=>openAddAct(day.id)}>
                    <Icon name="Plus" size={12}/>활동 추가
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 활동 추가/수정 모달 */}
      {actModal&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setActModal(false)}>
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-hd">
              <span className="modal-title"><Icon name="CalendarPlus" size={14}/>{editingAct?'활동 수정':'활동 추가'}</span>
              <button className="btn btn-ic btn-sm" onClick={()=>setActModal(false)}><Icon name="X" size={13}/></button>
            </div>
            <div className="modal-body">
              <div className="fg2">
                <div className="fg"><label>카테고리</label>
