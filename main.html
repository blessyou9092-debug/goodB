// ── WISHLIST (잡동사니) TAB ─────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
const WSH_STATUS = { wish:'찜', review:'검토중', bought:'구매완료' };
const WSH_STATUS_COLORS = { wish:'p-pur', review:'p-org', bought:'p-grn' };
const WSH_PRESET_CATS = ['전자기기/가전','가구/인테리어','패션/잡화','뷰티/향수','취미/스포츠','도서/문구','기타'];
const WSH_EMPTY = { id:'', cat:'', name:'', price:'', desire:3, need:3, status:'wish', link:'', note:'' };

const WishTab = () => {
  const [items, setItems] = useData('wsh_items', []);
  const [modal, setModal] = useState(false);
  const [lbSrc, setLbSrc] = useState(null);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState(WSH_EMPTY);
  const [search, setSearch] = useState('');
  const [statusF, setStatusF] = useState('전체');
  const [sort, setSort] = useState({ col:'priority', dir:'desc' });
  const [catInput, setCatInput] = useState('');

  const sf = k => v => setForm(f => ({ ...f, [k]: v }));
  const openAdd = () => { setEditing(null); setForm({ ...WSH_EMPTY, id:uid() }); setCatInput(''); setModal(true); };
  const openEdit = it => { setEditing(it.id); setForm({ ...it }); setCatInput(it.cat||''); setModal(true); };
  const save = () => {
    if (!form.name.trim()) return alert('제품명을 입력하세요');
    const finalForm = { ...form, cat: catInput.trim() || '기타' };
    if (editing) setItems(items.map(i => i.id===editing ? finalForm : i));
    else setItems([finalForm, ...items]);
    setModal(false);
  };
  const remove = id => { if (confirm('삭제할까요?')) setItems(items.filter(i => i.id!==id)); };
  const ts = col => setSort(s => s.col===col ? { col, dir:s.dir==='asc'?'desc':'asc' } : { col, dir:'desc' });

  const filtered = useMemo(() => {
    let d = items;
    if (statusF!=='전체') d = d.filter(i=>i.status===statusF);
    if (search) d = d.filter(i=>i.name.toLowerCase().includes(search.toLowerCase())||(i.cat||'').toLowerCase().includes(search.toLowerCase())||(i.note||'').toLowerCase().includes(search.toLowerCase()));
    return [...d].sort((a,b)=>{
      let va, vb;
      if (sort.col==='priority') {
        // 구매 우선순위 = 사고싶은마음 * 0.5 + 필요도 * 0.5
        va = Number(a.desire)*0.5 + Number(a.need)*0.5;
        vb = Number(b.desire)*0.5 + Number(b.need)*0.5;
      } else {
        va=a[sort.col]; vb=b[sort.col];
        if (['desire','need','price'].includes(sort.col)){va=Number(va);vb=Number(vb);}
      }
      return sort.dir==='asc'?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0);
    });
  }, [items, statusF, search, sort]);

  const Th = ({ col, label }) => (
    <th className="sort" onClick={()=>ts(col)}><div className="th-in">{label}<SortIco dir={sort.col===col?sort.dir:null}/></div></th>
  );

  const totalPrice = items.filter(i=>i.status!=='bought').reduce((s,i)=>s+(Number(i.price)||0),0);
  const boughtCount = items.filter(i=>i.status==='bought').length;

  // 별점 표시 (사고싶은마음 = 핑크, 필요도 = 파랑)
  const DesireStars = ({ v=0 }) => (
    <div className="stars">{[1,2,3,4,5].map(i=><span key={i} style={{fontSize:12,color:i<=v?'#e8729a':'#e0dcea'}}>♥</span>)}</div>
  );
  const NeedStars = ({ v=0 }) => (
    <div className="stars">{[1,2,3,4,5].map(i=><span key={i} style={{fontSize:12,color:i<=v?'#5a9fe0':'#e0dcea'}}>★</span>)}</div>
  );
  const DesireInput = ({ value, onChange }) => (
    <div className="star-input">{[1,2,3,4,5].map(i=>(
      <button key={i} type="button" onClick={()=>onChange(i)} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,padding:'1px',lineHeight:1}}>
        <span style={{color:i<=value?'#e8729a':'#e0dcea'}}>♥</span>
      </button>
    ))}</div>
  );
  const NeedInput = ({ value, onChange }) => (
    <div className="star-input">{[1,2,3,4,5].map(i=>(
      <button key={i} type="button" onClick={()=>onChange(i)} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,padding:'1px',lineHeight:1}}>
        <span style={{color:i<=value?'#5a9fe0':'#e0dcea'}}>★</span>
      </button>
    ))}</div>
  );

  return (
    <div className="fade-in section">
      <div className="card">
        <div className="sec-head">
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <div className="sec-title" style={{color:'#e07d28'}}>
              <Icon name="ShoppingBag" size={16} color="#e07d28"/>잡동사니
            </div>
            {totalPrice>0&&(
              <span style={{fontSize:11,fontWeight:600,color:'#b07800',background:'#fff8e1',padding:'2px 8px',borderRadius:20,border:'1px solid #ffd54f'}}>
                찜 합계 ₩{totalPrice.toLocaleString()}
              </span>
            )}
            {boughtCount>0&&(
              <span style={{fontSize:11,fontWeight:600,color:'#3aaa76',background:'#e8f8f0',padding:'2px 8px',borderRadius:20,border:'1px solid #b2dfcc'}}>
                구매완료 {boughtCount}
              </span>
            )}
          </div>
          <button className="btn btn-sm" style={{background:'linear-gradient(135deg,#fff3e0,#ffe0b2)',color:'#e07d28',border:'none',boxShadow:'0 2px 8px rgba(240,147,90,.25)'}} onClick={openAdd}>
            <Icon name="Plus" size={13}/>추가
          </button>
        </div>

        {/* 상태 필터 */}
        <div className="color-chips" style={{marginBottom:10}}>
          {['전체','wish','review','bought'].map(s=>(
            <button key={s} className={`color-chip ${statusF===s?'active':''}`}
              style={statusF===s?{background:'#e07d28',borderColor:'#e07d28',color:'white'}:{}}
              onClick={()=>setStatusF(s)}>
              {s==='전체'?'전체':WSH_STATUS[s]}
            </button>
          ))}
        </div>

        <div className="filter-row">
          <div className="srch"><Icon name="Search" size={13}/><input className="input-srch" placeholder="제품명, 카테고리 검색…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
        </div>

        <div className="tbl-wrap">
          <table>
            <thead>
              <tr style={{background:'#fff8e1'}}>
                <th style={{color:'#b07800'}}>#</th>
                <th style={{color:'#b07800'}}>카테고리</th>
                <Th col="name" label="제품명" />
                <Th col="price" label="예상가격" />
                <Th col="desire" label="사고싶은마음" />
                <Th col="need" label="필요도" />
                <Th col="priority" label="🎯 구매우선순위" />
                <th style={{color:'#b07800'}}>상태</th>
                <th style={{color:'#b07800'}}>링크</th>
                <th style={{color:'#b07800'}}>메모</th>
                <th style={{color:'#b07800'}}>사진</th>
                <th style={{color:'#b07800'}}>관리</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length===0?(
                <tr><td colSpan={11}><div className="empty"><Icon name="ShoppingBag" size={28}/><p>찜한 항목이 없습니다</p></div></td></tr>
              ):filtered.map((it,i)=>(
                <tr key={it.id} style={{cursor:'pointer',opacity:it.status==='bought'?.6:1}} onClick={()=>openEdit(it)}>
                  <td style={{color:'var(--text3)',fontSize:10}}>{i+1}</td>
                  <td><span className="pill p-org" style={{fontSize:10}}>{it.cat||'기타'}</span></td>
                  <td style={{fontWeight:600,textDecoration:it.status==='bought'?'line-through':''}}>{it.name}</td>
                  <td style={{color:'var(--text2)',fontWeight:600}}>{it.price?`₩${Number(it.price).toLocaleString()}`:'—'}</td>
                  <td><DesireStars v={Number(it.desire)}/></td>
                  <td><NeedStars v={Number(it.need)}/></td>
                  <td>
                    {(() => {
                      const score = Number(it.desire)*0.5 + Number(it.need)*0.5;
                      const pct = Math.round((score/5)*100);
                      const color = score>=4?'#e07d28':score>=3?'#f5c842':'#9d93b5';
                      return (
                        <div style={{display:'flex',alignItems:'center',gap:5,minWidth:80}}>
                          <div style={{flex:1,height:5,background:'#f0ede8',borderRadius:100,overflow:'hidden'}}>
                            <div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:100,transition:'width .3s'}}/>
                          </div>
                          <span style={{fontSize:10,fontWeight:700,color,minWidth:20}}>{score.toFixed(1)}</span>
                        </div>
                      );
                    })()}
                  </td>
                  <td><span className={`pill ${WSH_STATUS_COLORS[it.status]||'p-gry'}`}>{WSH_STATUS[it.status]||it.status}</span></td>
                  <td onClick={e=>e.stopPropagation()}>
                    {it.link?<a href={it.link} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:'var(--sky-acc)',display:'flex',alignItems:'center',gap:3}}><Icon name="ExternalLink" size={11} color="var(--sky-acc)"/>링크</a>:'—'}
                  </td>
                  <td style={{maxWidth:120,color:'var(--text2)',fontSize:11}}>{it.note?<span title={it.note}>{it.note.length>22?it.note.slice(0,22)+'…':it.note}</span>:'—'}</td>
                  <td><ImageThumb itemId={it.id} onOpen={setLbSrc}/></td>
                  <td><div className="ra" onClick={e=>e.stopPropagation()}>
                    <button className="btn btn-ic btn-sm" onClick={()=>openEdit(it)}><Icon name="Pencil" size={11}/></button>
                    <button className="btn b-danger btn-sm" onClick={()=>remove(it.id)}><Icon name="Trash2" size={11}/></button>
                  </div></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* 모달 */}
      <Modal open={modal} onClose={()=>setModal(false)}
        title={<><Icon name="ShoppingBag" size={14} color="#e07d28"/>{editing?'수정':'찜 추가'}</>}
        accent="b-ghost" onSave={save}>
        <div className="fg2">
          {/* 카테고리 자유입력 + 프리셋 */}
          <div className="fg full">
            <label>카테고리</label>
            <input className="inp" value={catInput} onChange={e=>setCatInput(e.target.value)} placeholder="직접 입력하거나 아래서 선택" />
            <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:5}}>
              {WSH_PRESET_CATS.map(c=>(
                <button key={c} type="button"
                  style={{padding:'3px 9px',borderRadius:20,border:`1.5px solid ${catInput===c?'#e07d28':'var(--border)'}`,background:catInput===c?'#fff3e0':'white',color:catInput===c?'#e07d28':'var(--text3)',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}
                  onClick={()=>setCatInput(catInput===c?'':c)}>{c}</button>
              ))}
            </div>
          </div>
          <div className="fg full"><label>제품명 *</label><input className="inp" value={form.name} onChange={e=>sf('name')(e.target.value)} placeholder="예) 다이슨 에어랩" /></div>
          <div className="fg"><label>예상 가격 (₩)</label><input className="inp" type="number" value={form.price} onChange={e=>sf('price')(e.target.value)} placeholder="예) 590000" /></div>
          <div className="fg"><label>상태</label>
            <select className="sel" value={form.status} onChange={e=>sf('status')(e.target.value)}>
              {Object.entries(WSH_STATUS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
          </div>
          <div className="fg"><label>사고싶은마음 ♥</label><DesireInput value={Number(form.desire)} onChange={sf('desire')}/></div>
          <div className="fg"><label>필요도 ★</label><NeedInput value={Number(form.need)} onChange={sf('need')}/></div>
          <div className="fg full"><label>구매 링크</label><input className="inp" value={form.link} onChange={e=>sf('link')(e.target.value)} placeholder="https://…" /></div>
          <div className="fg full"><label>사진</label><ImageUploadField itemId={form.id}/></div>
          <div className="fg full"><label>메모</label><textarea className="txta" value={form.note} onChange={e=>sf('note')(e.target.value)} placeholder="사고싶은 이유, 비교 제품 등" /></div>
        </div>
      </Modal>
      {lbSrc&&<Lightbox src={lbSrc} onClose={()=>setLbSrc(null)}/>}
    </div>
  );
};

// ── TripCardImage — 그라데이션 오버레이 이미지 ────────────────────
const TripCardImage = ({ tripId, name, dest, onOpen }) => {
  const { src } = useImage(tripId);
  if (!src) return null;
  return (
    <div className="trip-card-img-wrap" onClick={e=>{e.stopPropagation();onOpen(src);}}>
      <img src={src} alt={name} />
      <div className="trip-card-img-overlay">
        <div className="trip-card-img-name">{name}</div>
        {dest&&<div className="trip-card-img-dest"><Icon name="MapPin" size={10} color="rgba(255,255,255,.82)"/>{dest}</div>}
      </div>
    </div>
  );
};

// ── TravelTab ────────────────────────────────────────────────────
const TravelTab = () => {
  const [trips, setTrips] = useData('trv_trips', []);
  const [modal, setModal] = useState(false);
  const [lbSrc, setLbSrc] = useState(null);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState(TRV_EMPTY);
  const [selected, setSelected] = useState(null);
  const [newCheck, setNewCheck] = useState('');
  const [statusF, setStatusF] = useState('전체');
  const [detailTab, setDetailTab] = useState('overview'); // 'overview' | 'days'

  const sf = k => v => setForm(f => ({ ...f, [k]: v }));
  const openAdd = () => { setEditing(null); setForm({ ...TRV_EMPTY, id:uid(), checklist:[], days:[] }); setModal(true); };
  const openEdit = it => { setEditing(it.id); setForm({ ...it, checklist:[...(it.checklist||[])], days:[...(it.days||[])] }); setModal(true); };
  const save = () => {
    if (!form.name.trim()) return alert('여행명을 입력하세요');
    if (editing) { setTrips(trips.map(i=>i.id===editing?form:i)); if(selected?.id===editing) setSelected(form); }
    else setTrips([form,...trips]);
    setModal(false);
  };
  const remove = id => { if(confirm('삭제할까요?')) { setTrips(trips.filter(i=>i.id!==id)); if(selected?.id===id) setSelected(null); } };

  const toggleCheck = (tripId, checkId) => {
    const updated = trips.map(t => t.id!==tripId ? t : {
      ...t, checklist: t.checklist.map(c => c.id===checkId ? {...c, done:!c.done} : c)
    });
    setTrips(updated);
    if (selected?.id===tripId) setSelected(updated.find(t=>t.id===tripId));
  };
  const addCheck = tripId => {
    if (!newCheck.trim()) return;
    const updated = trips.map(t => t.id!==tripId ? t : {
      ...t, checklist: [...(t.checklist||[]), { id:uid(), text:newCheck.trim(), done:false }]
    });
    setTrips(updated);
    if (selected?.id===tripId) setSelected(updated.find(t=>t.id===tripId));
    setNewCheck('');
  };
  const removeCheck = (tripId, checkId) => {
    const updated = trips.map(t => t.id!==tripId ? t : {
      ...t, checklist: t.checklist.filter(c=>c.id!==checkId)
    });
    setTrips(updated);
    if (selected?.id===tripId) setSelected(updated.find(t=>t.id===tripId));
  };

  const filtered = useMemo(() => {
    if (statusF==='전체') return trips;
    return trips.filter(t=>t.status===statusF);
  }, [trips, statusF]);

  const upcoming = trips.filter(t=>t.status==='plan').length;
  const ongoing  = trips.filter(t=>t.status==='going').length;
  const doneCount= trips.filter(t=>t.status==='done').length;

  const selTrip = selected ? trips.find(t=>t.id===selected.id) : null;

  return (
    <div className="fade-in section">
      {/* Status + inline stats */}
      <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:8}}>
        <span className="istat-item" style={{background:'rgba(90,159,224,.1)',color:'var(--sky-acc)'}}>전체 {trips.length}</span>
        <span className="istat-item" style={{background:'rgba(139,115,212,.1)',color:'var(--lav-acc)'}}>계획중 {upcoming}</span>
        <span className="istat-item" style={{background:'rgba(58,170,118,.1)',color:'#3aaa76'}}>여행중 {ongoing}</span>
        <span className="istat-item">완료 {doneCount}</span>
      </div>
      <div className="color-chips" style={{marginBottom:12}}>
        {['전체','plan','going','done'].map(s=>(
          <button key={s} className={`color-chip ${statusF===s?'active':''}`}
            style={statusF===s?{background:'var(--sky-acc)',borderColor:'var(--sky-acc)'}:{}}
            onClick={()=>setStatusF(s)}>
            {s==='전체'?'전체':TRV_STATUS[s]}
          </button>
        ))}
        <button className="btn b-trv btn-sm" style={{marginLeft:'auto'}} onClick={openAdd}><Icon name="Plus" size={12}/>여행 추가</button>
      </div>

      {/* Trip detail panel */}
      {selTrip&&(
        <div className="trip-detail">
          {/* 상단 헤더 */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div className="trip-detail-title">
              <Icon name="MapPin" size={16} color="var(--sky-acc)" />
              {selTrip.name}
              <span className={`pill ${TRV_COLORS[selTrip.status]}`}>{TRV_STATUS[selTrip.status]}</span>
            </div>
            <div className="ra">
              <button className="btn btn-ic btn-sm" onClick={()=>openEdit(selTrip)}><Icon name="Pencil" size={11}/></button>
              <button className="btn b-danger btn-sm" onClick={()=>remove(selTrip.id)}><Icon name="Trash2" size={11}/></button>
              <button className="btn b-ghost btn-sm" onClick={()=>setSelected(null)}><Icon name="X" size={11}/></button>
            </div>
          </div>

          {/* 내부 탭: 개요 / 일별계획 */}
          <div style={{display:'flex',gap:0,borderBottom:'2px solid var(--border)',marginBottom:14}}>
            {[['overview','개요','LayoutList'],['days','일별 계획','CalendarDays']].map(([id,label,icon])=>(
              <button key={id}
                style={{display:'flex',alignItems:'center',gap:5,padding:'7px 14px',border:'none',background:'none',fontFamily:'inherit',fontSize:12,fontWeight:600,cursor:'pointer',color:detailTab===id?'var(--sky-acc)':'var(--text3)',borderBottom:detailTab===id?'2px solid var(--sky-acc)':'2px solid transparent',marginBottom:-2,transition:'all .15s'}}
                onClick={()=>setDetailTab(id)}>
                <Icon name={icon} size={13} color={detailTab===id?'var(--sky-acc)':'var(--text3)'}/>{label}
              </button>
            ))}
          </div>

          {/* 개요 탭 */}
          {detailTab==='overview'&&(
            <>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                <div>
                  <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',marginBottom:4}}>목적지</div>
                  <div style={{fontSize:13,fontWeight:600}}>{selTrip.dest||'—'}</div>
                </div>
                <div>
                  <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',marginBottom:4}}>여행 기간</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>{selTrip.startDate&&selTrip.endDate?`${selTrip.startDate} ~ ${selTrip.endDate}`:'날짜 미설정'}</div>
                </div>
              </div>

              {/* Budget */}
              {(selTrip.budget||selTrip.spent)&&(
                <div style={{background:'var(--sky)',borderRadius:'var(--rs)',padding:'12px 14px',marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--sky-acc)',marginBottom:8,display:'flex',alignItems:'center',gap:5}}><Icon name="Wallet" size={13} color="var(--sky-acc)"/>예산 현황</div>
                  <div className="budget-row">
                    {selTrip.budget&&<div className="budget-item"><span className="budget-lbl">총 예산</span><span className="budget-val">₩{Number(selTrip.budget).toLocaleString()}</span></div>}
                    {selTrip.spent&&<div className="budget-item"><span className="budget-lbl">사용금액</span><span className="budget-val" style={{color:'var(--blush-acc)'}}>₩{Number(selTrip.spent).toLocaleString()}</span></div>}
                    {selTrip.budget&&selTrip.spent&&<div className="budget-item"><span className="budget-lbl">잔여</span><span className="budget-val" style={{color:'var(--mint-acc)'}}>₩{(Number(selTrip.budget)-Number(selTrip.spent)).toLocaleString()}</span></div>}
                  </div>
                  {selTrip.budget&&selTrip.spent&&(
                    <div style={{marginTop:10}}>
                      <ProgressBar value={Math.round((Number(selTrip.spent)/Number(selTrip.budget))*100)} accent="var(--sky-acc)" />
                    </div>
                  )}
                </div>
              )}

              {/* Checklist */}
              <div style={{marginBottom:4}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
                  <Icon name="CheckSquare" size={13} color="var(--lav-acc)"/>
                  준비물 체크리스트
                  <span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)'}}>
                    {(selTrip.checklist||[]).filter(c=>c.done).length}/{(selTrip.checklist||[]).length}
                  </span>
                </div>
                <div className="check-list">
                  {(selTrip.checklist||[]).map(c=>(
                    <div key={c.id} className={`check-item ${c.done?'done':''}`}>
                      <input type="checkbox" id={c.id} checked={c.done} onChange={()=>toggleCheck(selTrip.id,c.id)} />
                      <label htmlFor={c.id}>{c.text}</label>
                      <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',padding:2}} onClick={()=>removeCheck(selTrip.id,c.id)}><Icon name="X" size={11}/></button>
                    </div>
                  ))}
                </div>
                <div className="check-add">
                  <input className="inp" style={{flex:1}} value={newCheck} onChange={e=>setNewCheck(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&addCheck(selTrip.id)} placeholder="항목 추가 후 Enter" />
                  <button className="btn b-trv btn-sm" onClick={()=>addCheck(selTrip.id)}><Icon name="Plus" size={12}/></button>
                </div>
              </div>

              {selTrip.note&&<div style={{marginTop:12,padding:'10px 12px',background:'#f9f7ff',borderRadius:'var(--rs)',fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
                <span style={{fontWeight:600,fontSize:10,color:'var(--text3)'}}>메모 · </span>{selTrip.note}
              </div>}
            </>
          )}

          {/* 일별 계획 탭 */}
          {detailTab==='days'&&(
            <DayPlanPanel trip={selTrip} trips={trips} setTrips={setTrips} setSelected={setSelected} />
          )}
        </div>
      )}

      {/* Trip cards */}
      {filtered.length===0?(
        <div className="card"><div className="empty"><Icon name="Plane" size={28}/><p>등록된 여행이 없습니다</p></div></div>
      ):(
        <div className="trip-grid">
          {filtered.map(t=>{
            const total = (t.checklist||[]).length;
            const doneCl= (t.checklist||[]).filter(c=>c.done).length;
            const pct   = total ? Math.round((doneCl/total)*100) : 0;
            const dayCount = (t.days||[]).length;
            const actCount = (t.days||[]).reduce((s,d)=>s+(d.activities||[]).length,0);
            return (
              <div key={t.id} className={`trip-card ${selTrip?.id===t.id?'selected':''}`} onClick={()=>{setSelected(selTrip?.id===t.id?null:t);setDetailTab('overview');}}>
                <TripCardImage tripId={t.id} name={t.name} dest={t.dest} onOpen={v=>{setLbSrc(v);}} />
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                  <span className={`pill ${TRV_COLORS[t.status]}`}>{TRV_STATUS[t.status]}</span>
                  <div className="ra" onClick={e=>e.stopPropagation()}>
                    <button className="btn btn-ic btn-sm" onClick={()=>openEdit(t)}><Icon name="Pencil" size={11}/></button>
                    <button className="btn b-danger btn-sm" onClick={()=>remove(t.id)}><Icon name="Trash2" size={11}/></button>
                  </div>
                </div>
                <div className="trip-name">{t.name}</div>
                {t.dest&&<div className="trip-dest"><Icon name="MapPin" size={12} color="var(--sky-acc)"/>{t.dest}</div>}
                {(t.startDate||t.endDate)&&<div className="trip-dates">{t.startDate} {t.endDate?`~ ${t.endDate}`:''}</div>}
                {/* 일별 계획 요약 */}
                {(dayCount>0||actCount>0)&&(
                  <div style={{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}}>
                    {dayCount>0&&<span className="pill p-blu" style={{fontSize:9}}><Icon name="CalendarDays" size={9}/>{dayCount}일 계획</span>}
                    {actCount>0&&<span className="pill p-mnt" style={{fontSize:9}}>{actCount}개 활동</span>}
                  </div>
                )}
                {total>0&&(
                  <div className="trip-prog-row">
                    <div style={{flex:1}}><ProgressBar value={pct} accent="var(--sky-acc)" /></div>
                    <span style={{fontSize:10,color:'var(--text3)',flexShrink:0}}>{doneCl}/{total}</span>
                  </div>
                )}
                {t.budget&&<div style={{marginTop:8,fontSize:11,color:'var(--text2)'}}>예산 ₩{Number(t.budget).toLocaleString()}</div>}
              </div>
            );
          })}
        </div>
      )}

      <Modal open={modal} onClose={()=>setModal(false)} title={<><Icon name="Plane" size={14}/>{editing?'여행 수정':'여행 추가'}</>} accent="b-trv" onSave={save}>
        <div className="fg2">
          <div className="fg full"><label>여행명 *</label><input className="inp" value={form.name} onChange={e=>sf('name')(e.target.value)} placeholder="예) 오사카 봄여행" /></div>
          <div className="fg full"><label>목적지</label><input className="inp" value={form.dest} onChange={e=>sf('dest')(e.target.value)} placeholder="예) 일본 오사카" /></div>
          <div className="fg"><label>출발일</label><input className="inp" type="date" value={form.startDate} onChange={e=>sf('startDate')(e.target.value)} /></div>
          <div className="fg"><label>귀국일</label><input className="inp" type="date" value={form.endDate} onChange={e=>sf('endDate')(e.target.value)} /></div>
          <div className="fg"><label>상태</label>
            <select className="sel" value={form.status} onChange={e=>sf('status')(e.target.value)}>
              {Object.entries(TRV_STATUS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
          </div>
          <div className="fg"><label>총 예산 (₩)</label><input className="inp" type="number" value={form.budget} onChange={e=>sf('budget')(e.target.value)} placeholder="예) 500000" /></div>
          <div className="fg full"><label>사용 금액 (₩)</label><input className="inp" type="number" value={form.spent} onChange={e=>sf('spent')(e.target.value)} placeholder="예) 230000" /></div>
          <div className="fg full"><label>사진</label><ImageUploadField itemId={form.id} /></div>
          <div className="fg full"><label>메모</label><textarea className="txta" value={form.note} onChange={e=>sf('note')(e.target.value)} placeholder="숙소, 항공, 여행 팁 등" /></div>
        </div>
      </Modal>
      {lbSrc&&<Lightbox src={lbSrc} onClose={()=>setLbSrc(null)}/>}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════
const TABS = [
  { id:'inv', label:'생필품', icon:'ShoppingCart', cls:'t-inv' },
  { id:'cos', label:'화장품', icon:'Sparkles',     cls:'t-cos' },
  { id:'clo', label:'옷장',   icon:'Shirt',        cls:'t-clo' },
  { id:'wsh', label:'잡동사니', icon:'ShoppingBag', cls:'t-wsh' },
  { id:'trv', label:'여행',   icon:'Plane',        cls:'t-trv' },
];

// ═══════════════════════════════════════════════════════════════════
// FIREBASE SETUP & AUTH UI
// ═══════════════════════════════════════════════════════════════════
const FirebaseSettings = ({ open, onClose, auth }) => {
  const [cfgText, setCfgText] = useState(() => {
    const c = getStoredFbConfig();
    return c ? JSON.stringify(c, null, 2) : '';
  });
  const [mode, setMode] = useState('signin'); // signin | signup
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState('');

  if (!open) return null;

  const configured = !!__fbAuth;
  const signedIn = !!auth.user;

  const saveConfig = () => {
    setMsg('');
    let cfg;
    try {
      // 사용자가 JS 객체 형태로 붙여넣을 수도 있으니 보정
      let txt = cfgText.trim();
      // const firebaseConfig = {...}; 형태 지원
      const m = txt.match(/\{[\s\S]*\}/);
      if (m) txt = m[0];
      // JS 키를 JSON 키로 변환 (apiKey: → "apiKey":)
      txt = txt.replace(/([{,]\s*)([a-zA-Z_$][\w$]*)\s*:/g, '$1"$2":');
      // 작은따옴표 → 큰따옴표
      txt = txt.replace(/'/g, '"');
      // 후행 쉼표 제거
      txt = txt.replace(/,(\s*[}\]])/g, '$1');
      cfg = JSON.parse(txt);
    } catch (e) {
      setMsg('⚠️ 설정 JSON 파싱 실패: ' + e.message);
      return;
    }
    if (!cfg.apiKey || !cfg.projectId) {
      setMsg('⚠️ apiKey, projectId가 필요합니다.');
      return;
    }
    localStorage.setItem(FB_CONFIG_KEY, JSON.stringify(cfg));
    const result = initFirebase(cfg);
    if (result) {
      setMsg('✓ Firebase 연결 완료! 로그인하세요.');
      setTimeout(()=>window.location.reload(), 800);
    } else {
      setMsg('⚠️ Firebase 초기화 실패');
    }
  };

  const signIn = async () => {
    if (!__fbAuth) return setMsg('먼저 Firebase 설정을 저장하세요.');
    if (!email || !pw) return setMsg('이메일과 비밀번호를 입력하세요.');
    setBusy(true); setMsg('');
    try {
      if (mode === 'signup') await __fbAuth.createUserWithEmailAndPassword(email, pw);
      else await __fbAuth.signInWithEmailAndPassword(email, pw);
      setMsg('✓ 로그인 완료');
      setTimeout(onClose, 400);
    } catch(e) {
      setMsg('⚠️ ' + (e.message || e.code));
    } finally { setBusy(false); }
  };

  const signOut = async () => {
    if (!__fbAuth) return;
    await __fbAuth.signOut();
    setMsg('로그아웃 됨');
  };

  const clearConfig = () => {
    if (!confirm('Firebase 설정을 지우고 로컬 모드로 전환할까요? (데이터는 보존됩니다)')) return;
    localStorage.removeItem(FB_CONFIG_KEY);
    if (__fbAuth) { __fbAuth.signOut().catch(()=>{}); }
    setTimeout(()=>window.location.reload(), 300);
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:500}}>
        <div className="modal-hd">
          <span className="modal-title">
            <Icon name="Cloud" size={15} color={signedIn?'#3aaa76':'var(--text3)'}/>
            클라우드 동기화 (Firebase)
          </span>
          <button className="btn btn-ic btn-sm" onClick={onClose}><Icon name="X" size={13}/></button>
        </div>
        <div className="modal-body">
          {/* 현재 상태 */}
          <div style={{padding:'10px 12px',background:signedIn?'#e8f8f0':configured?'#fff8e1':'var(--lav)',borderRadius:'var(--rs)',marginBottom:14,fontSize:12,lineHeight:1.7}}>
            <div style={{fontWeight:700,marginBottom:3,color:signedIn?'#3aaa76':configured?'#b07800':'var(--lav-acc)'}}>
              {signedIn ? '✓ 동기화 활성' : configured ? '⚙ Firebase 설정 완료, 로그인 필요' : '○ 로컬 모드 (이 기기에서만 저장)'}
            </div>
            {signedIn && <div style={{color:'var(--text2)'}}>계정: {auth.user.email}</div>}
          </div>

          {/* 1단계: Firebase 설정 */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,marginBottom:6,display:'flex',alignItems:'center',gap:5}}>
              <span style={{background:'var(--lav-acc)',color:'white',width:18,height:18,borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:10}}>1</span>
              Firebase 설정 JSON
            </div>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:6,lineHeight:1.6}}>
              Firebase Console → 프로젝트 설정 → 내 앱 → SDK 설정 및 구성에서 <b>firebaseConfig</b> 객체를 복사해서 붙여넣으세요.
            </div>
            <textarea
              className="txta" style={{fontFamily:'monospace',fontSize:11,minHeight:120}}
              placeholder={`{
  "apiKey": "AIza...",
  "authDomain": "myapp.firebaseapp.com",
  "projectId": "myapp",
  ...
}`}
              value={cfgText} onChange={e=>setCfgText(e.target.value)} />
            <div style={{display:'flex',gap:6,marginTop:6}}>
              <button className="btn b-pri btn-sm" onClick={saveConfig}>
                <Icon name="Save" size={11}/>설정 저장 & 연결
              </button>
              {configured && (
                <button className="btn b-danger btn-sm" onClick={clearConfig}>
                  <Icon name="X" size={11}/>설정 지우기
                </button>
              )}
            </div>
          </div>

          {/* 2단계: 로그인 */}
          <div style={{opacity:configured?1:.4,pointerEvents:configured?'auto':'none'}}>
            <div style={{fontSize:12,fontWeight:700,marginBottom:6,display:'flex',alignItems:'center',gap:5}}>
              <span style={{background:'var(--lav-acc)',color:'white',width:18,height:18,borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:10}}>2</span>
              로그인 / 가입
            </div>
            {signedIn ? (
              <button className="btn b-danger btn-sm" onClick={signOut}><Icon name="LogOut" size={11}/>로그아웃</button>
            ) : (
              <>
                <div className="tog-wrap" style={{maxWidth:260,marginBottom:8}}>
                  <button type="button" className={`tog ${mode==='signin'?'t-yes':''}`} onClick={()=>setMode('signin')}>로그인</button>
                  <button type="button" className={`tog ${mode==='signup'?'t-yes':''}`} onClick={()=>setMode('signup')}>회원가입</button>
                </div>
                <div className="fg2">
                  <div className="fg full"><label>이메일</label>
                    <input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" />
                  </div>
                  <div className="fg full"><label>비밀번호 (6자 이상)</label>
                    <input className="inp" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••" />
                  </div>
                </div>
                <button className="btn b-pri btn-sm" style={{marginTop:8}} onClick={signIn} disabled={busy}>
                  {busy?'처리 중…':<><Icon name="LogIn" size={11}/>{mode==='signup'?'가입하고 시작':'로그인'}</>}
                </button>
              </>
            )}
          </div>

          {msg && (
            <div style={{marginTop:14,padding:'8px 12px',background:msg.startsWith('✓')?'#e8f8f0':'#fff4f4',color:msg.startsWith('✓')?'#3aaa76':'#c0392b',borderRadius:'var(--rs)',fontSize:11,fontWeight:600}}>
              {msg}
            </div>
          )}

          {/* 안내 */}
          <details style={{marginTop:16,padding:'10px 12px',background:'var(--lav)',borderRadius:'var(--rs)',fontSize:11,color:'var(--text2)',lineHeight:1.7}}>
            <summary style={{cursor:'pointer',fontWeight:700,color:'var(--lav-acc)'}}>📖 처음 설정하시나요? (Firebase 가이드)</summary>
            <div style={{marginTop:8}}>
              <b>① Firebase 프로젝트 생성</b><br/>
              → <a href="https://console.firebase.google.com" target="_blank" rel="noopener noreferrer" style={{color:'var(--lav-acc)'}}>console.firebase.google.com</a> → 프로젝트 추가<br/><br/>
              <b>② Authentication 활성화</b><br/>
              → 빌드 → Authentication → 시작하기 → 이메일/비밀번호 사용 설정<br/><br/>
              <b>③ Firestore Database 생성</b><br/>
              → 빌드 → Firestore Database → 데이터베이스 만들기 → <b>프로덕션 모드</b><br/>
              → 규칙 탭에서 아래 내용으로 저장:<br/>
              <pre style={{background:'white',padding:8,borderRadius:6,fontSize:10,marginTop:4,overflow:'auto'}}>{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /users/{userId}/{document=**} {
      allow read, write: if request.auth != null && request.auth.uid == userId;
    }
  }
}`}</pre><br/>
              <b>④ 웹 앱 등록 & 설정 복사</b><br/>
              → 프로젝트 개요 → 웹 아이콘 (&lt;/&gt;) → 앱 등록 → firebaseConfig 객체 복사 → 위 텍스트박스에 붙여넣기<br/><br/>
              <b>⑤ 도메인 등록 (GitHub Pages 호스팅 시)</b><br/>
              → Authentication → Settings → 승인된 도메인 → 본인의 GitHub Pages 도메인 (예: yourname.github.io) 추가<br/><br/>
              <b>⑥ 모바일에서도 동일 계정으로 로그인하면 자동 동기화됩니다.</b>
            </div>
          </details>
        </div>
      </div>
    </div>
  );
};

const App = () => {
  const [tab, setTab] = useState('inv');
  const [fbModal, setFbModal] = useState(false);
  const auth = useFirebaseAuth();
  const signedIn = !!auth.user;

  return (
    <div className="app">
      <div className="header">
        <div className="logo"><Icon name="Package" size={18} color="white" /></div>
        <div className="header-text">
          <div className="header-title">생활 통합관리</div>
          <div className="header-sub">생필품 · 화장품 · 옷장 · 잡동사니 · 여행</div>
        </div>
        <ImportExport renderLinks={true} />
        <button
          className="firebase-badge"
          style={{
            cursor:'pointer',border:'none',
            background: signedIn?'#e8f8f0':'#fff4e5',
            color: signedIn?'#2e7d52':'#e07d28',
            borderColor: signedIn?'#b2dfcc':'#ffd8a8',
            display:'inline-flex',alignItems:'center',gap:4
          }}
          onClick={()=>setFbModal(true)}
          title={signedIn?`동기화 중 (${auth.user.email})`:'클라우드 동기화 설정'}
        >
          {signedIn ? '☁️ 동기화 ON' : '⚙️ 동기화 OFF'}
        </button>
      </div>

      <FirebaseSettings open={fbModal} onClose={()=>setFbModal(false)} auth={auth} />

      <ImportExport renderLinks={false} />

      <div className="tab-bar">        {TABS.map(t => (
          <button key={t.id} className={`tab-btn ${t.cls} ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>
            <Icon name={t.icon} size={14} />
            <span className="tab-label">{t.label}</span>
          </button>
        ))}
      </div>

      {tab==='inv' && <InventoryTab />}
      {tab==='cos' && <CosmeticsTab />}
      {tab==='clo' && <ClosetTab />}
      {tab==='wsh' && <WishTab />}
      {tab==='trv' && <TravelTab />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
