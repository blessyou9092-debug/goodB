<!DOCTYPE html>
<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Meow-cenary: 랭킹 PvP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#eee;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none;touch-action:none}
canvas{width:100%;flex:1;display:block;min-height:0}
#ui{background:#141422;border-top:2px solid #222;padding:8px;display:flex;flex-direction:column;gap:6px;height:36%;overflow:hidden}
button{background:#6c3bd5;color:#fff;border:none;padding:5px 11px;border-radius:5px;font-weight:bold;font-size:11px;cursor:pointer;transition:all .15s}
button:hover{filter:brightness(1.2)}button:active{transform:scale(.95)}button:disabled{opacity:.4;cursor:default}
.btn-eq{background:#2a5a3a}.btn-pvp{background:#c0392b}.btn-rank{background:#1a5a8a}.btn-save{background:#5a4a10}
.row{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
.gold{color:#ffd93d;font-weight:bold;font-size:11px}.info{color:#888;font-size:10px;margin-left:auto}
.slots{display:flex;gap:3px;flex-shrink:0}.slots-label{font-size:10px;color:#888;width:26px;align-self:center}
.slot{flex:1;height:60px;border-radius:5px;border:2px solid #333;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;position:relative;cursor:pointer;transition:all .2s}
.slot .emoji{font-size:18px}.slot .stat{font-size:7px;color:#aaa}.slot .lvl{font-size:7px;font-weight:bold}
.slot .lvup{position:absolute;bottom:-2px;font-size:6px;background:#141422;border:1px solid #333;border-radius:3px;padding:1px 3px;color:#6c3bd5;font-weight:bold;cursor:pointer}
.bench-area{flex:1;overflow-y:auto;min-height:0}.bench-label{font-size:10px;color:#888}
.bench{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
.bench-cat{width:44px;height:44px;border-radius:4px;border:1px solid #333;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;cursor:pointer}
.bench-cat:hover{border-color:#6c3bd5}
.equip-panel{flex:1;overflow-y:auto}.equip-slots{display:flex;gap:3px;margin-bottom:4px}
.equip-slot{width:52px;height:44px;border-radius:4px;border:1px solid #333;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;cursor:pointer}
.inv-grid{display:flex;flex-wrap:wrap;gap:3px}
.inv-item{width:60px;height:52px;border-radius:4px;border:1px solid #333;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:7px;cursor:pointer}
.inv-item:hover{border-color:#6c3bd5}
.pvp-center{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px}
.pulse{animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:100;padding:12px}
.modal{background:#141422;border:1px solid #2a2a3a;border-radius:10px;padding:16px;width:100%;max-width:340px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:13px;font-weight:bold;margin-bottom:10px;color:#fff}
.modal input,.modal textarea{width:100%;background:#1a1a2e;border:1px solid #444;color:#fff;padding:6px 8px;border-radius:5px;font-size:11px;outline:none;font-family:inherit}
.modal textarea{resize:vertical;min-height:48px}
.modal label{font-size:10px;color:#888;display:block;margin-bottom:3px;margin-top:8px}
.modal-btns{display:flex;gap:6px;margin-top:12px}.modal-btns button{flex:1;padding:7px}
.rank-list{display:flex;flex-direction:column;gap:4px;max-height:58vh;overflow-y:auto}
.rank-item{background:#1a1a2e;border-radius:6px;padding:7px 10px;border-left:3px solid #333}
.rank-item.r-gold{border-left-color:#ffd93d}.rank-item.r-silver{border-left-color:#aaa}
.rank-item.r-bronze{border-left-color:#cd7f32}.rank-item.r-me{border-left-color:#6c3bd5}
.rank-header{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.rank-num{font-size:11px;font-weight:bold;width:20px;color:#888}
.rank-name{font-size:11px;font-weight:bold;flex:1}
.rank-score{font-size:11px;color:#ffd93d;font-weight:bold}
.rank-detail{font-size:9px;color:#555}
.rank-comment{font-size:9px;color:#999;margin-top:2px;font-style:italic}
.net{font-size:9px;padding:2px 5px;border-radius:3px;background:#1a2a1a;color:#44ff88}
.net.err{background:#2a1a1a;color:#ff6644}
</style>

<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="row" id="topRow"></div>
  <div id="mainPanel"></div>
  <div id="equipPanel" style="display:none"></div>
</div>
<div id="modalContainer"></div>
<script>
// ============ JSONBIN ============
const BIN_ID='69c4b626b7ec241ddca4462c';
const API_KEY='$2a$10$EHr0nZlhpAiZRZ4Ev.Ttq.5DES52whpsQQzzUNLDxQE6cY4je6NlW';
const BIN_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;
let _cache=null,_saving=false,_dirty=false;

async function dbRead(){
  try{
    const r=await fetch(BIN_URL,{headers:{'X-Master-Key':API_KEY}});
    if(!r.ok)throw new Error(r.status);
    const j=await r.json();
    _cache=j.record;
    if(!_cache.rankings)_cache.rankings=[];
    if(!_cache.decks)_cache.decks={};
    netOk(true);return _cache;
  }catch(e){netOk(false);return _cache||{rankings:[],decks:{}};}
}
async function dbWrite(data){
  if(_saving){_dirty=true;_cache=data;return;}
  _saving=true;_cache=data;
  try{
    const r=await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Versioning':'false'},body:JSON.stringify(data)});
    if(!r.ok)throw new Error(r.status);
    netOk(true);
  }catch(e){netOk(false);}
  _saving=false;
  if(_dirty){_dirty=false;await dbWrite(_cache);}
}
function netOk(ok){const el=document.getElementById('netSt');if(el){el.textContent=ok?'🟢':'🔴';el.className='net'+(ok?'':' err');}}

// ============ CONSTANTS ============
const CLASS_COLORS={warrior:'#ff6b6b',mage:'#6bc5ff',gunner:'#ffd93d',bard:'#c084fc'};
const CLASS_EMOJIS={warrior:'⚔️',mage:'🔮',gunner:'🔫',bard:'🎸'};
const RARITY_COLORS={N:'#aaa',R:'#55aaff',SR:'#cc66ff',SSR:'#ffcc00'};
const CAT_NAMES=['냥냥이','뭉치','치즈','까망이','나비','루나','모모','코코','소라','하루','미르','초코','별이','구름','눈송이','호두','콩이','탱탱이'];
const BATTLE_Y=60,GACHA_COST=50,LVL_COST=20,DROP_CHANCE=0.15;
const EQUIP_NAMES={weapon:['날카로운 발톱','마법 지팡이','황금 검','번개 채찍','드래곤 클로'],armor:['가죽 갑옷','미스릴 조끼','마법 로브','강철 흉갑','드래곤 갑옷'],accessory:['행운의 방울','속도의 부적','힘의 반지','마나 목걸이','전설의 왕관']};
const EQUIP_ICONS={weapon:'🗡️',armor:'🛡️',accessory:'💍'};
let idC=0;const gid=()=>'id_'+(idC++);

// ============ FACTORY ============
function createCat(cls,rarity,slot){
  const rm={N:1,R:1.5,SR:2.2,SSR:3.5}[rarity];
  const bs={warrior:{hp:150,atk:20,spd:.5},mage:{hp:80,atk:35,spd:.3},gunner:{hp:90,atk:28,spd:.6},bard:{hp:100,atk:15,spd:.4}}[cls];
  const ba=Math.floor(bs.atk*rm);
  return{id:gid(),name:CAT_NAMES[Math.floor(Math.random()*CAT_NAMES.length)],charClass:cls,rarity,level:1,
  hp:Math.floor(bs.hp*rm),maxHp:Math.floor(bs.hp*rm),baseAtk:ba,atk:ba,baseSpeed:bs.spd,speed:bs.spd,
  x:0,y:0,targetX:0,targetY:0,attackCooldown:cls==='warrior'?30:cls==='gunner'?20:40,attackTimer:0,
  color:CLASS_COLORS[cls],size:22,scaleAnim:0,slot,skillCooldown:200,skillTimer:0,
  equipment:{weapon:null,armor:null,accessory:null},dragging:false};
}
function createEnemy(wave,cw,bh){const hp=40+wave*20+Math.floor(Math.random()*wave*8);
return{id:gid(),hp,maxHp:hp,atk:8+wave*3,x:cw+20+Math.random()*60,y:BATTLE_Y+40+Math.random()*(bh-80),
speed:.7+Math.random()*.4+wave*.04,size:16+Math.random()*8,color:`hsl(${Math.random()*30+10},60%,45%)`,hitAnim:0,dead:false,deathAnim:0};}
function createProj(x,y,tx,ty,dmg,col,sz){const dx=tx-x,dy=ty-y,d=Math.sqrt(dx*dx+dy*dy)||1;
return{x,y,vx:dx/d*6,vy:dy/d*6,damage:dmg,color:col,size:sz,life:120,trail:[]};}
function spawnParts(x,y,n,col,type,sm=1){const r=[];for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=(1+Math.random()*3)*sm;
r.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*30,maxLife:50,color:col,size:2+Math.random()*4,type});}return r;}
function mkText(x,y,t,c,s=14){return{x,y,text:t,color:c,life:60,vy:-1.5,size:s};}
function rollGacha(){const c=['warrior','mage','gunner','bard'],cl=c[Math.floor(Math.random()*4)],r=Math.random();
return{charClass:cl,rarity:r<.5?'N':r<.8?'R':r<.95?'SR':'SSR'};}
function createEquip(wave){const slots=['weapon','armor','accessory'],slot=slots[Math.floor(Math.random()*3)],
names=EQUIP_NAMES[slot],r=Math.random(),rarity=r<.5?'N':r<.8?'R':r<.95?'SR':'SSR',
mult={N:1,R:2,SR:3.5,SSR:6}[rarity],bs=3+wave*1.5;
return{id:gid(),name:names[Math.floor(Math.random()*names.length)],slot,rarity,
atkBonus:slot==='weapon'?Math.floor(bs*mult):Math.floor(bs*mult*.3),
hpBonus:slot==='armor'?Math.floor(bs*mult*5):Math.floor(bs*mult),
speedBonus:slot==='accessory'?+(mult*.05).toFixed(2):0,icon:EQUIP_ICONS[slot]};}
function createDrop(x,y,w){return{x,y,vy:-2,life:300,equipment:createEquip(w),collected:false};}
function recalcStats(cat){let a=0,h=0,s=0;for(const eq of Object.values(cat.equipment)){if(eq){a+=eq.atkBonus;h+=eq.hpBonus;s+=eq.speedBonus;}}
cat.atk=cat.baseAtk+a;cat.speed=cat.baseSpeed+s;const oh=cat.maxHp;cat.maxHp=oh+h;if(cat.hp>cat.maxHp)cat.hp=cat.maxHp;}
function positionCats(cats,cw,bh){cats.filter(c=>c.slot>=0&&!c.dragging).forEach((cat,i)=>{
if(cat.targetX===0&&cat.targetY===0){cat.targetX=cat.charClass==='warrior'?80:40;cat.targetY=BATTLE_Y+60+i*50;}
if(cat.x===0){cat.x=cat.targetX;cat.y=cat.targetY;}});}
function checkSynergy(cats){const c=new Set(cats.map(c=>c.charClass));return c.has('bard')&&(c.has('mage')||c.has('gunner'));}

// ============ STATE ============
const starter=createCat('warrior','N',0);
const S={cats:[starter],enemies:[],projectiles:[],particles:[],floatingTexts:[],
gold:100,wave:1,combo:0,maxCombo:0,comboTimer:0,cameraShake:0,slowMotion:0,flashAlpha:0,synergyCooldown:0,
teamSlots:[starter,null,null,null],roster:[starter],gachaAnim:null,totalKills:0,inventory:[],equipDrops:[]};

let playerId=null,playerName=null;
try{playerId=localStorage.getItem('meow_pid');playerName=localStorage.getItem('meow_nick');}catch(e){}
let pvpStatus='idle',pvpMatch=null,pvpBattle=null;

// ============ DB OPS ============
function serializeTeam(){
  return{cats:S.teamSlots.filter(c=>c!==null).map(c=>({
    charClass:c.charClass,rarity:c.rarity,level:c.level,atk:c.atk,maxHp:c.maxHp,name:c.name,color:c.color,
    equipment:{
      weapon:c.equipment.weapon?{atkBonus:c.equipment.weapon.atkBonus,hpBonus:c.equipment.weapon.hpBonus,speedBonus:c.equipment.weapon.speedBonus,icon:c.equipment.weapon.icon,name:c.equipment.weapon.name}:null,
      armor:c.equipment.armor?{atkBonus:c.equipment.armor.atkBonus,hpBonus:c.equipment.armor.hpBonus,speedBonus:c.equipment.armor.speedBonus,icon:c.equipment.armor.icon,name:c.equipment.armor.name}:null,
      accessory:c.equipment.accessory?{atkBonus:c.equipment.accessory.atkBonus,hpBonus:c.equipment.accessory.hpBonus,speedBonus:c.equipment.accessory.speedBonus,icon:c.equipment.accessory.icon,name:c.equipment.accessory.name}:null
    }
  }))};
}
async function saveDeck(){
  if(!playerId)return;
  const team=serializeTeam();if(team.cats.length===0)return;
  const db=await dbRead();
  db.decks[playerId]={playerId,playerName,team,wave:S.wave,savedAt:Date.now()};
  await dbWrite(db);
  S.floatingTexts.push(mkText(canvas.width/2,80,'💾 덱 저장됨!','#00ffaa',15));
}
async function saveRanking(won,comment,opponentName,score){
  if(!playerId)return;
  const db=await dbRead();
  if(!db.rankings)db.rankings=[];
  const idx=db.rankings.findIndex(r=>r.playerId===playerId);
  if(idx>=0){
    db.rankings[idx].wins+=(won?1:0);db.rankings[idx].losses+=(won?0:1);
    db.rankings[idx].totalScore+=score;db.rankings[idx].lastComment=comment||db.rankings[idx].lastComment||'';
    db.rankings[idx].lastOpponent=opponentName;db.rankings[idx].lastAt=Date.now();db.rankings[idx].playerName=playerName;
  }else{
    db.rankings.push({playerId,playerName,wins:won?1:0,losses:won?0:1,totalScore:score,lastComment:comment||'',lastOpponent:opponentName,lastAt:Date.now()});
  }
  db.rankings.sort((a,b)=>b.wins-a.wins||b.totalScore-a.totalScore);
  await dbWrite(db);
}
function calcScore(battle){
  const surv=battle.myUnits.filter(u=>!u.dead);
  const hpLeft=surv.reduce((s,u)=>s+u.hp,0);
  const maxHp=battle.myUnits.reduce((s,u)=>s+u.maxHp,0);
  return Math.floor(surv.length*500+(maxHp>0?hpLeft/maxHp*300:0)+(battle.winner==='me'?200:0));
}

// ============ ENGINE ============
function findClosest(x,y,arr){let cl=null,md=Infinity;arr.forEach(e=>{if(e.dead)return;const d=(e.x-x)**2+(e.y-y)**2;if(d<md){md=d;cl=e;}});return cl;}
function dealDmg(e,dmg,col){e.hp-=dmg;e.hitAnim=5;S.particles.push(...spawnParts(e.x,e.y,5,col,'hit'));
S.floatingTexts.push(mkText(e.x+(Math.random()-.5)*20,e.y-10,`-${dmg}`,col,12));
if(e.hp<=0&&!e.dead){e.dead=true;e.deathAnim=0;S.combo++;S.comboTimer=120;S.maxCombo=Math.max(S.maxCombo,S.combo);
S.totalKills++;S.gold+=5+Math.floor(S.wave*1.5);S.particles.push(...spawnParts(e.x,e.y,15,'#ffd93d',<
